<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diagnóstico | Casa em Ordem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Quicksand', sans-serif; background: linear-gradient(160deg,#12432f,#1e6b4a); color:#fff; min-height:100vh; }
  #shell { max-width:520px; margin:0 auto; padding:28px 20px 60px; min-height:100vh; }
  .logo { text-align:center; font-weight:700; font-size:20px; letter-spacing:1px; margin-bottom:18px; }
  .logo span { color:#ffb08a; }
  .progress-track { background:rgba(255,255,255,0.15); border-radius:20px; height:8px; overflow:hidden; margin-bottom:34px; }
  .progress-fill { background:linear-gradient(90deg,#ffb08a,#e8734a); height:100%; border-radius:20px; transition:width .4s ease; }
  .eyebrow { color:#ffb08a; font-weight:700; font-size:12px; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px; }
  h1.q { font-size:24px; font-weight:700; line-height:1.3; margin:0 0 24px; }
  .opt { display:flex; align-items:center; gap:14px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.18); border-radius:14px; padding:16px 18px; margin-bottom:14px; cursor:pointer; font-size:15px; font-weight:600; transition: all .15s ease; }
  .opt:hover { background:rgba(255,255,255,0.15); border-color:#ffb08a; }
  .opt .emoji { font-size:20px; }
  .btn { display:block; width:100%; text-align:center; background:linear-gradient(90deg,#ff9e6d,#e8734a); color:#fff; border:none; border-radius:14px; padding:18px; font-size:16px; font-weight:700; cursor:pointer; margin-top:6px; box-shadow:0 8px 20px rgba(232,115,74,0.35); text-decoration:none; }
  .btn:hover { filter:brightness(1.05); }
  p.body-txt { font-size:15px; line-height:1.6; color:#eaf3ee; margin-bottom:20px; }
  .card { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:16px; padding:20px; margin-bottom:20px; }
  .stat-row { display:flex; justify-content:space-around; text-align:center; margin:20px 0; }
  .stat-num { font-size:26px; font-weight:700; color:#ffb08a; }
  .stat-label { font-size:12px; color:#dfeee6; margin-top:4px; }
  .compare-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
  .compare-col { border-radius:14px; padding:14px; font-size:13px; }
  .compare-col.before { background:rgba(200,60,60,0.15); border:1px solid rgba(255,120,120,0.3); }
  .compare-col.after { background:rgba(63,174,122,0.15); border:1px solid rgba(63,174,122,0.4); }
  .compare-col h4 { margin:0 0 10px; font-size:13px; }
  .compare-col ul { margin:0; padding-left:18px; }
  .compare-col li { margin-bottom:6px; }
  .loader-wrap { text-align:center; padding:60px 0; }
  .bar-outer { background:rgba(255,255,255,0.15); border-radius:20px; height:14px; overflow:hidden; margin:24px 0 10px; }
  .bar-inner { background:linear-gradient(90deg,#ffb08a,#e8734a); height:100%; width:0%; border-radius:20px; transition:width .3s linear; }
  .result-badge { background:rgba(255,255,255,0.08); border:2px solid #ffb08a; border-radius:16px; padding:22px; text-align:center; margin:20px 0; }
  .result-badge h2 { font-size:26px; margin:6px 0; color:#ffe3d1; }
  .testi-card { background:rgba(255,255,255,0.07); border:1px dashed rgba(255,255,255,0.35); border-radius:14px; padding:16px; margin-bottom:14px; font-size:13px; color:#dfeee6; font-style:italic; }
  .offer-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.12); font-size:14px; }
  .price-box { text-align:center; background:rgba(255,255,255,0.08); border-radius:16px; padding:24px; margin:20px 0; }
  .price-old { text-decoration:line-through; opacity:.6; font-size:16px; }
  .price-new { font-size:38px; font-weight:700; color:#ffe3d1; margin:6px 0; }
  .timer { display:flex; justify-content:center; gap:10px; margin:16px 0; }
  .timer .box { background:#0f3d26; border:1px solid #ffb08a; border-radius:10px; padding:10px 14px; text-align:center; min-width:60px; }
  .timer .num { font-size:24px; font-weight:700; color:#ffb08a; }
  .timer .lbl { font-size:10px; color:#dfeee6; }
  .guarantee { display:flex; gap:12px; align-items:flex-start; background:rgba(63,174,122,0.15); border:1px solid rgba(63,174,122,0.4); border-radius:14px; padding:16px; margin-top:20px; font-size:13px; }
</style>
</head>
<body>
<div id="shell">
  <div class="logo">CASA EM <span>ORDEM</span></div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div id="app"></div>
</div>

<script>
(function(){
  const app = document.getElementById('app');
  const progressFill = document.getElementById('progressFill');
  let STEP = 0;
  const ANSWERS = {};
  const QUIZ_STEPS = 10;

  // ATENÇÃO: troque pela data REAL do fim da sua promoção
  const DEADLINE = new Date('2026-07-15T23:59:59');

  // ATENÇÃO: troque pelo link REAL de checkout (Kiwify)
  const CHECKOUT_URL = 'https://pay.kiwify.com.br/JuDImie';

  function setProgress(){
    let pct = STEP <= QUIZ_STEPS-1 ? Math.round((STEP/(QUIZ_STEPS-1))*100) : 100;
    progressFill.style.width = pct + '%';
  }

  function optHTML(emoji, label, action, value){
    return '<div class="opt" data-action="'+action+'" data-value="'+value+'"><span class="emoji">'+emoji+'</span><span>'+label+'</span></div>';
  }

  function render(){
    setProgress();
    let html = '';
    switch(STEP){
      case 0:
        html = '<div class="eyebrow">Responda com sinceridade</div>'
        +'<h1 class="q">Hoje, sua casa te dá mais paz ou mais peso?</h1>'
        +optHTML('😮‍💨','Mais peso, se eu for sincera','q1','peso')
        +optHTML('😔','Vivo tentando e nunca fica pronto','q1','tentando')
        +optHTML('🤍','Tem dias bons e dias difíceis','q1','misto')
        +optHTML('🙂','Tá ok, mas quero mais leveza','q1','ok');
        break;
      case 1:
        html = '<div class="eyebrow">Você não está sozinha nisso</div>'
        +'<h1 class="q">A maioria das mulheres sente exatamente isso</h1>'
        +'<div class="card"><div class="stat-row">'
        +'<div><div class="stat-num">78%</div><div class="stat-label">sentem que a casa nunca fica pronta</div></div>'
        +'<div><div class="stat-num">62%</div><div class="stat-label">sentem culpa quase todo dia</div></div>'
        +'</div></div>'
        +'<p class="body-txt">A boa notícia: isso não é falta de esforço. É falta de um sistema que caiba na sua rotina real.</p>'
        +'<div class="btn" data-action="next">Quero entender melhor</div>';
        break;
      case 2:
        html = '<div class="eyebrow">Pergunta 1 de 5</div>'
        +'<h1 class="q">Quem mais te ajuda na rotina da casa?</h1>'
        +optHTML('🙋‍♀️','Praticamente ninguém, sou só eu','q2','sozinha')
        +optHTML('🤝','Peço ajuda às vezes','q2','as_vezes')
        +optHTML('👨‍👩‍👧','Dividimos, mas falta organização','q2','divide')
        +optHTML('👶','Tenho filhos pequenos e a rotina é corrida','q2','filhos');
        break;
      case 3:
        html = '<div class="eyebrow">Pergunta 2 de 5</div>'
        +'<h1 class="q">O que mais pesa no seu dia a dia?</h1>'
        +optHTML('🧹','A limpeza que nunca acaba','q3','limpeza')
        +optHTML('🥘','Não saber o que fazer de comida','q3','cozinha')
        +optHTML('👕','Roupa e louça acumulando','q3','roupa')
        +optHTML('⏰','Falta de tempo pra tudo','q3','tempo');
        break;
      case 4:
        html = '<div class="eyebrow">A verdade que ninguém te conta</div>'
        +'<h1 class="q">Não falta esforço. Falta um método que caiba na sua rotina.</h1>'
        +'<p class="body-txt">Com um passo a passo pronto — sem exigir perfeição — manter a casa em ordem vira algo simples e sustentável, não mais um peso na sua lista.</p>'
        +'<div class="btn" data-action="next">Faz sentido pra mim</div>';
        break;
      case 5:
        html = '<div class="eyebrow">Pergunta 3 de 5</div>'
        +'<h1 class="q">Qual frase combina mais com a sua rotina hoje?</h1>'
        +optHTML('💼','Trabalho fora e chego exausta pra cuidar de casa','perfil','A')
        +optHTML('🏠','Fico em casa e mesmo assim não dou conta de tudo','perfil','B');
        break;
      case 6:
        html = '<div class="eyebrow">Pergunta 4 de 5</div>'
        +'<h1 class="q">Qual seria sua maior vitória daqui a 30 dias?</h1>'
        +optHTML('🏡','Casa em ordem sem sofrer por isso','q5','ordem')
        +optHTML('🍲','Nunca mais travar na hora de cozinhar','q5','cozinha')
        +optHTML('🕊️','Ter tempo de verdade pra mim','q5','tempo')
        +optHTML('💪','Sentir orgulho da minha casa','q5','orgulho');
        break;
      case 7:
        html = '<div class="eyebrow">Imagine daqui 30 dias</div>'
        +'<h1 class="q">Como seria sua vida se...</h1>'
        +'<div class="card"><strong>🏠 A casa se mantém sozinha</strong><p class="body-txt" style="margin:6px 0 0">Uma rotina curta e constante substitui o faxinão do fim de semana.</p></div>'
        +'<div class="card"><strong>🥦 A cozinha deixa de ser um problema</strong><p class="body-txt" style="margin:6px 0 0">Cardápio pronto, lista de compras certa, sem perder tempo pensando.</p></div>'
        +'<div class="card"><strong>🕊️ Sobra tempo pra você</strong><p class="body-txt" style="margin:6px 0 0">Menos tempo apagando incêndio, mais tempo de descanso real.</p></div>'
        +'<div class="btn" data-action="next">Eu quero essa vida</div>';
        break;
      case 8:
        html = '<div class="eyebrow">De que lado você quer estar?</div>'
        +'<h1 class="q">Sem o método x Com o método</h1>'
        +'<div class="compare-grid">'
        +'<div class="compare-col before"><h4>❌ Sem método</h4><ul><li>Faxinão pesado no fim de semana</li><li>Culpa constante</li><li>Ninguém ajuda de verdade</li><li>Fim de semana consumido</li></ul></div>'
        +'<div class="compare-col after"><h4>✅ Com o método</h4><ul><li>15 min por dia no lugar de horas</li><li>Rotina que cabe na sua realidade</li><li>Família com tarefas simples</li><li>Fim de semana de descanso</li></ul></div>'
        +'</div>'
        +'<div class="btn" data-action="next">Quero esse lado</div>';
        break;
      case 9:
        html = '<div class="eyebrow">Pergunta 5 de 5</div>'
        +'<h1 class="q">Se existisse um caminho simples e acessível, você começaria hoje?</h1>'
        +optHTML('🔥','Sim, já decidi','q6','decidida')
        +optHTML('💗','Sim, se for fácil de seguir','q6','facil')
        +optHTML('✅','Com certeza, já passou da hora','q6','certeza');
        break;
      case 10:
        html = '<div class="loader-wrap">'
        +'<h1 class="q" style="text-align:center">Preparando seu diagnóstico personalizado</h1>'
        +'<div class="bar-outer"><div class="bar-inner" id="loadBar"></div></div>'
        +'<p class="body-txt" style="text-align:center" id="loadLabel">Analisando suas respostas...</p>'
        +'</div>';
        break;
      case 11: {
        const perfilA = ANSWERS.perfil === 'A';
        const titulo = perfilA ? 'ROTINA CORRIDA — QUEM TRABALHA FORA' : 'CASA EM TEMPO INTEGRAL — QUEM FICA EM CASA';
        const plano = perfilA ? 'Plano A' : 'Plano B';
        html = '<div class="eyebrow">Seu diagnóstico está pronto</div>'
        +'<p class="body-txt">Seu perfil:</p>'
        +'<div class="result-badge"><h2>'+titulo+'</h2>'
        +'<p class="body-txt" style="margin-bottom:0">O Casa em Ordem tem um guia específico pra você: o <strong>'+plano+'</strong>, pensado exatamente pra sua rotina.</p></div>'
        +'<div class="card"><strong>O que o Casa em Ordem resolve pra você:</strong>'
        +'<p class="body-txt" style="margin:10px 0 0">◆ Uma rotina de limpeza que se mantém sozinha<br>◆ Cardápio e compras sem perder tempo pensando<br>◆ Fim da culpa por não dar conta de tudo</p></div>'
        +'<div class="btn" data-action="next">Ver minha solução</div>';
        break;
      }
      case 12:
        html = '<h1 class="q">Com a palavra, quem já organizou a casa:</h1>'
        +'<div class="testi-card">[ inserir depoimento aqui ]</div>'
        +'<div class="testi-card">[ inserir depoimento aqui ]</div>'
        +'<div class="testi-card">[ inserir depoimento aqui ]</div>'
        +'<div class="btn" data-action="next">Eu quero isso também</div>';
        break;
      case 13: {
        html = '<h1 class="q" style="text-align:center">KIT COMPLETO CASA EM ORDEM</h1>'
        +'<p class="body-txt" style="text-align:center">Tudo pra sua casa rodar no automático, sem culpa e sem perfeição.</p>'
        +'<div class="card">'
        +'<div class="offer-item">✅ Plano A + Plano B (dois guias completos)</div>'
        +'<div class="offer-item">✅ Agendas diária, semanal e mensal</div>'
        +'<div class="offer-item">✅ Cardápio, lista de compras e controle de estoque</div>'
        +'<div class="offer-item">✅ Cards de limpeza e roteiro de emergência</div>'
        +'<div class="offer-item">✅ Desafio dos 30 Dias + Rotina do Pet</div>'
        +'<div class="offer-item">✅ Acesso imediato após a compra</div>'
        +'</div>'
        +'<div class="price-box">'
        +'<div class="price-old">De R$97,00</div>'
        +'<div class="price-new">R$49,90</div>'
        +'<div class="body-txt" style="margin:0">ou em até 6x de R$8,87 no cartão</div>'
        +'<p style="color:#ffb08a; font-weight:700; font-size:13px; margin-top:14px">⏳ Esta condição especial termina em:</p>'
        +'<div class="timer"><div class="box"><div class="num" id="td">-</div><div class="lbl">DIAS</div></div><div class="box"><div class="num" id="th">-</div><div class="lbl">HORAS</div></div><div class="box"><div class="num" id="tm">-</div><div class="lbl">MIN</div></div><div class="box"><div class="num" id="ts">-</div><div class="lbl">SEG</div></div></div>'
        +'<a class="btn" href="'+CHECKOUT_URL+'">Quero organizar minha casa →</a>'
        +'</div>'
        +'<div class="guarantee">🛡️ <div><strong>Garantia de 7 dias.</strong> Se não amar, devolvemos 100% do seu dinheiro, sem perguntas.</div></div>';
        break;
      }
    }
    app.innerHTML = html;
    if (STEP===10) startLoading();
    if (STEP===13) startCountdown();
  }

  function startLoading(){
    let p = 0;
    const bar = document.getElementById('loadBar');
    const timer = setInterval(function(){
      p += Math.random()*18+8;
      if(p>=100){ p=100; clearInterval(timer); setTimeout(function(){ STEP=11; render(); }, 500); }
      bar.style.width = p+'%';
    }, 300);
  }

  function startCountdown(){
    function tick(){
      const now = new Date();
      let diff = DEADLINE - now;
      if(diff<0) diff=0;
      const d = Math.floor(diff/(1000*60*60*24));
      const h = Math.floor((diff/(1000*60*60))%24);
      const m = Math.floor((diff/(1000*60))%60);
      const s = Math.floor((diff/1000)%60);
      const td=document.getElementById('td'), th=document.getElementById('th'), tm=document.getElementById('tm'), ts=document.getElementById('ts');
      if(td){ td.textContent=d; th.textContent=String(h).padStart(2,'0'); tm.textContent=String(m).padStart(2,'0'); ts.textContent=String(s).padStart(2,'0'); }
    }
    tick();
    setInterval(tick, 1000);
  }

  app.addEventListener('click', function(e){
    const el = e.target.closest('[data-action]');
    if(!el) return;
    const action = el.getAttribute('data-action');
    if(action==='next'){ STEP++; render(); return; }
    const value = el.getAttribute('data-value');
    ANSWERS[action] = value;
    STEP++;
    render();
  });

  render();
})();
</script>
</body>
</html>
