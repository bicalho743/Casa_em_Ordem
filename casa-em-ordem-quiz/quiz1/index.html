function startLoading(){
let p = 0;
const bar = document.getElementById('loadBar');
const timer = setInterval(function(){
p += Math.random()*18+8;
if(p>=100){ p=100; clearInterval(timer); setTimeout(function(){ STEP=13; render(); }, 500); }
bar.style.width = p+'%';
}, 300);
}

function startCountdown(){
function tick(){
const now = new Date();
let diff = DEADLINE - now;
if(diff<0) diff=0;
const d = Math.floor(diff/(1000*60*60*24));
const h = Math.floor((diff/(1000*60*60))%24);
const m = Math.floor((diff/(1000*60))%60);
const s = Math.floor((diff/1000)%60);
const td=document.getElementById('td'), th=document.getElementById('th'), tm=document.getElementById('tm'), ts=document.getElementById('ts');
if(td){ td.textContent=d; th.textContent=String(h).padStart(2,'0'); tm.textContent=String(m).padStart(2,'0'); ts.textContent=String(s).padStart(2,'0'); }
}
tick();
setInterval(tick, 1000);
}

function setupCarousel(){
const track = document.getElementById('materialsCarousel');
const dotsWrap = document.getElementById('carouselDots');
if(!track || !dotsWrap) return;
const imgs = track.querySelectorAll('img');
dotsWrap.innerHTML = '';
imgs.forEach(function(_, i){
const dot = document.createElement('span');
dot.className = 'dot' + (i===0 ? ' active' : '');
dot.addEventListener('click', function(){
track.scrollTo({ left: track.clientWidth * i, behavior: 'smooth' });
});
dotsWrap.appendChild(dot);
});
track.addEventListener('scroll', function(){
const idx = Math.round(track.scrollLeft / track.clientWidth);
Array.prototype.forEach.call(dotsWrap.children, function(dot, i){
dot.classList.toggle('active', i===idx);
});
});
const prevBtn = document.getElementById('carouselPrev');
const nextBtn = document.getElementById('carouselNext');
function goTo(i){
var clamped = Math.max(0, Math.min(imgs.length-1, i));
track.scrollTo({ left: track.clientWidth * clamped, behavior: 'smooth' });
}
if(prevBtn){ prevBtn.addEventListener('click', function(){
var idx = Math.round(track.scrollLeft / track.clientWidth);
goTo(idx - 1);
}); }
if(nextBtn){ nextBtn.addEventListener('click', function(){
var idx = Math.round(track.scrollLeft / track.clientWidth);
goTo(idx + 1);
}); }
}

app.addEventListener('click', function(e){
const el = e.target.closest('[data-action]');
if(!el) return;
const action = el.getAttribute('data-action');
if(action==='next'){ STEP++; render(); return; }
const value = el.getAttribute('data-value');
ANSWERS[action] = value;
STEP++;
